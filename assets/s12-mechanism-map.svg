<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">s12 mechanism map</title>
  <desc id="desc">All tutorial mechanisms attach around the same while loop: prompt assembly, replay, budget, streaming, tools, spill, persistence, compaction, cache, subagents, and DAG teams.</desc>
  <style>
    .bg{fill:#f8fafc}.loop{fill:#fff;stroke:#0f172a;stroke-width:2.5;rx:16}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.pre{fill:#ede9fe}.mid{fill:#dbeafe}.post{fill:#dcfce7}.side{fill:#fef3c7}.label{font:700 23px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
  <rect class="bg" width="920" height="560"/>
  <text x="40" y="48" class="label">合体机制地图：机制挂在循环周围，循环骨架不变</text>
  <rect class="box pre" x="60" y="80" width="350" height="86"/><text x="235" y="114" text-anchor="middle" class="txt">进循环前</text><text x="235" y="140" text-anchor="middle" class="small">s10 拼 prompt + 扫技能；s08 重放；s05 修复坏历史</text>
  <rect class="loop" x="185" y="205" width="550" height="240"/>
  <text x="460" y="238" text-anchor="middle" class="txt">while (true)</text>
  <rect class="box mid" x="225" y="265" width="150" height="54"/><text x="300" y="298" text-anchor="middle" class="small">chat()</text>
  <rect class="box mid" x="405" y="265" width="150" height="54"/><text x="480" y="298" text-anchor="middle" class="small">assistant msg</text>
  <rect class="box post" x="585" y="265" width="110" height="54"/><text x="640" y="298" text-anchor="middle" class="small">s02 工具执行</text>
  <rect class="box post" x="405" y="355" width="150" height="54"/><text x="480" y="388" text-anchor="middle" class="small">tool 结果入历史</text>
  <path class="arrow" d="M375 292 H402"/><path class="arrow" d="M555 292 H582"/><path class="arrow" d="M640 319 C640 375 610 382 558 382"/><path class="arrow" d="M405 382 C300 382 300 345 300 322"/>
  <rect class="box side" x="60" y="225" width="110" height="70"/><text x="115" y="253" text-anchor="middle" class="small">s03</text><text x="115" y="274" text-anchor="middle" class="small">预算闸 + 看门狗</text>
  <rect class="box side" x="60" y="330" width="110" height="70"/><text x="115" y="358" text-anchor="middle" class="small">s06</text><text x="115" y="379" text-anchor="middle" class="small">轮末压缩</text>
  <rect class="box side" x="750" y="225" width="120" height="70"/><text x="810" y="253" text-anchor="middle" class="small">s05 + s07</text><text x="810" y="274" text-anchor="middle" class="small">流式/缓存</text>
  <rect class="box side" x="750" y="330" width="120" height="70"/><text x="810" y="358" text-anchor="middle" class="small">s04 + s08</text><text x="810" y="379" text-anchor="middle" class="small">溢出/落盘</text>
  <path class="arrow" d="M170 260 H222"/><path class="arrow" d="M170 365 H402"/><path class="arrow" d="M735 260 H748"/><path class="arrow" d="M695 365 H747"/>
  <rect class="box pre" x="510" y="80" width="350" height="86"/><text x="685" y="114" text-anchor="middle" class="txt">旁路</text><text x="685" y="140" text-anchor="middle" class="small">s09 子代理心跳；s11 DAG 把多个循环编成队</text>
  <path class="arrow" d="M235 166 V202"/><path class="arrow" d="M685 166 V202"/>
  <text x="460" y="510" text-anchor="middle" class="small">s01 的骨架始终是：问模型 → 执行工具 → 结果喂回去 → 再问一次</text>
</svg>
