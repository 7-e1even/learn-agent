<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">s15 progressive tool disclosure</title>
  <desc id="desc">Progressive tool disclosure keeps the provider tools array stable while deferred tools are searched and invoked through a proxy.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.stable{fill:#dcfce7}.defer{fill:#e0f2fe}.msg{fill:#fef3c7}.bad{fill:#fee2e2}.label{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.badline{stroke:#ef4444;stroke-width:2.4;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
  <rect class="bg" width="920" height="430"/>
  <text x="40" y="48" class="label">渐进式工具披露：搜索结果进消息，tools 数组不变</text>

  <rect class="stable" x="52" y="108" width="220" height="92"/>
  <text x="162" y="138" text-anchor="middle" class="txt">stable tools array</text>
  <text x="162" y="164" text-anchor="middle" class="small">run_shell / search_tool</text>
  <text x="162" y="186" text-anchor="middle" class="small">run_tool proxy</text>

  <rect class="defer" x="52" y="254" width="220" height="92"/>
  <text x="162" y="284" text-anchor="middle" class="txt">deferred directory</text>
  <text x="162" y="310" text-anchor="middle" class="small">name + summary + schema</text>
  <text x="162" y="332" text-anchor="middle" class="small">not sent as provider tools</text>

  <rect class="box" x="350" y="108" width="190" height="74"/>
  <text x="445" y="138" text-anchor="middle" class="txt">search_tool</text>
  <text x="445" y="162" text-anchor="middle" class="small">find deferred match</text>

  <rect class="msg" x="350" y="246" width="190" height="74"/>
  <text x="445" y="276" text-anchor="middle" class="txt">message result</text>
  <text x="445" y="300" text-anchor="middle" class="small">schema enters tail</text>

  <rect class="box" x="620" y="108" width="210" height="74"/>
  <text x="725" y="138" text-anchor="middle" class="txt">run_tool(name,input)</text>
  <text x="725" y="162" text-anchor="middle" class="small">dispatch target tool</text>

  <rect class="bad" x="620" y="246" width="210" height="74"/>
  <text x="725" y="276" text-anchor="middle" class="txt">bad backfill</text>
  <text x="725" y="300" text-anchor="middle" class="small">tools array grows</text>

  <path class="arrow" d="M272 154 H347"/>
  <path class="arrow" d="M445 182 V243"/>
  <path class="arrow" d="M540 283 C598 283 605 160 617 150"/>
  <path class="arrow" d="M272 300 H347"/>
  <path class="badline" d="M272 300 C430 388 620 380 724 323"/>
  <text x="446" y="385" text-anchor="middle" class="small">bad: revealing tools by appending descriptors breaks the cache prefix</text>
</svg>
