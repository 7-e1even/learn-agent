<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">s07 cache prefix</title>
  <desc id="desc">Stable prefixes hit provider cache; volatile bytes near the beginning break cache for the rest of the request.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.hit{fill:#dcfce7}.miss{fill:#fee2e2}.new{fill:#dbeafe}.label{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
  <rect class="bg" width="920" height="430"/>
  <text x="40" y="48" class="label">前缀缓存：断点越靠前，账单越贵</text>
  <text x="70" y="96" class="txt">健康形状：system/tools/旧 history 逐字节相同，新内容只追加在尾部</text>
  <rect class="box hit" x="70" y="122" width="180" height="62"/><text x="160" y="158" text-anchor="middle" class="small">system 稳定</text>
  <rect class="box hit" x="260" y="122" width="160" height="62"/><text x="340" y="158" text-anchor="middle" class="small">tools 稳定</text>
  <rect class="box hit" x="430" y="122" width="230" height="62"/><text x="545" y="158" text-anchor="middle" class="small">历史只追加不改写</text>
  <rect class="box new" x="670" y="122" width="180" height="62"/><text x="760" y="158" text-anchor="middle" class="small">新增 user 消息</text>
  <text x="460" y="220" text-anchor="middle" class="txt">命中部分按低价读；全价只付尾部新增字节</text>
  <text x="70" y="282" class="txt">坏形状：时间戳写进 system，开头第一段就变，后面全崩</text>
  <rect class="box miss" x="70" y="308" width="220" height="62"/><text x="180" y="344" text-anchor="middle" class="small">system: 当前时间变化</text>
  <rect class="box miss" x="300" y="308" width="180" height="62"/><text x="390" y="344" text-anchor="middle" class="small">tools 全价</text>
  <rect class="box miss" x="490" y="308" width="220" height="62"/><text x="600" y="344" text-anchor="middle" class="small">历史全价</text>
  <rect class="box miss" x="720" y="308" width="130" height="62"/><text x="785" y="344" text-anchor="middle" class="small">尾部全价</text>
  <path class="arrow" d="M180 305 V250"/>
  <text x="360" y="252" class="small">断点之后全部 cache miss</text>
</svg>
