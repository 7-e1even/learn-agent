<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">s09 subagent watchdog</title>
  <desc id="desc">A parent agent dispatches isolated subagents and an external heartbeat watchdog kills stale workers while salvaging their summary.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.parent{fill:#dbeafe}.child{fill:#dcfce7}.watch{fill:#fef3c7}.bad{fill:#fee2e2}.label{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#ef4444;stroke-width:2.2;stroke-dasharray:7 6;fill:none;marker-end:url(#red)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker><marker id="red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/></marker></defs>
  <rect class="bg" width="920" height="430"/>
  <text x="40" y="48" class="label">子代理：上下文隔离 + 心跳看门狗</text>
  <rect class="box parent" x="60" y="120" width="190" height="120"/><text x="155" y="158" text-anchor="middle" class="txt">主 agent</text><text x="155" y="186" text-anchor="middle" class="small">只保留最终结论</text><text x="155" y="212" text-anchor="middle" class="small">主上下文不被污染</text>
  <rect class="box child" x="360" y="90" width="210" height="180"/><text x="465" y="128" text-anchor="middle" class="txt">子代理</text><text x="465" y="158" text-anchor="middle" class="small">全新 messages=[]</text><text x="465" y="184" text-anchor="middle" class="small">自己跑工具</text><text x="465" y="210" text-anchor="middle" class="small">没有 task 工具</text><text x="465" y="236" text-anchor="middle" class="small">深度上限 1</text>
  <rect class="box watch" x="660" y="80" width="200" height="100"/><text x="760" y="112" text-anchor="middle" class="txt">心跳看门狗</text><text x="760" y="138" text-anchor="middle" class="small">两只表：心跳 + 墙钟硬顶</text><text x="760" y="162" text-anchor="middle" class="small">到点先验尸，活着就延期</text>
  <rect class="box bad" x="660" y="230" width="200" height="110"/><text x="760" y="266" text-anchor="middle" class="txt">stale / timeout</text><text x="760" y="294" text-anchor="middle" class="small">先 kill</text><text x="760" y="320" text-anchor="middle" class="small">再抢救遗言</text>
  <path class="arrow" d="M250 180 H357"/><path class="arrow" d="M570 180 C610 180 610 130 657 130"/><path class="dash" d="M760 180 V227"/>
  <path class="arrow" d="M660 300 C570 370 250 330 180 243"/>
  <text x="382" y="365" text-anchor="middle" class="small">成功：结论回主线；失败：遗言说明已做/未做/下一步</text>
</svg>
