<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">s08 event log replay</title>
  <desc id="desc">Append-only JSONL events are replayed into session state; torn final lines can be skipped without losing the whole session.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.log{fill:#ede9fe}.state{fill:#dcfce7}.bad{fill:#fee2e2}.label{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
  <rect class="bg" width="920" height="430"/>
  <text x="40" y="48" class="label">会话落盘：状态从事件流重放出来</text>
  <rect class="box bad" x="50" y="92" width="250" height="104"/>
  <text x="175" y="124" text-anchor="middle" class="txt">全量重写 JSON</text>
  <text x="175" y="150" text-anchor="middle" class="small">崩溃在写到一半</text>
  <text x="175" y="174" text-anchor="middle" class="small">整个会话可能报废</text>
  <rect class="box log" x="370" y="70" width="220" height="270"/>
  <text x="480" y="104" text-anchor="middle" class="txt">session.jsonl</text>
  <text x="480" y="140" text-anchor="middle" class="small">session_meta</text>
  <text x="480" y="176" text-anchor="middle" class="small">message(user)</text>
  <text x="480" y="212" text-anchor="middle" class="small">message(assistant)</text>
  <text x="480" y="248" text-anchor="middle" class="small">tool_call(status)</text>
  <text x="480" y="284" text-anchor="middle" class="small">message(tool)</text>
  <text x="480" y="320" text-anchor="middle" class="small" fill="#dc2626">半截坏行：跳过</text>
  <rect class="box state" x="680" y="118" width="190" height="150"/>
  <text x="775" y="154" text-anchor="middle" class="txt">replaySession()</text>
  <text x="775" y="184" text-anchor="middle" class="small">fold 事件流</text>
  <text x="775" y="210" text-anchor="middle" class="small">恢复 messages</text>
  <text x="775" y="236" text-anchor="middle" class="small">恢复 meta/model</text>
  <text x="334" y="132" text-anchor="middle" class="small" fill="#dc2626">✗ 对照</text><path d="M300 148 H367" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" fill="none"/><path class="arrow" d="M590 193 H677"/>
  <text x="480" y="390" text-anchor="middle" class="small">已写过的字节永不回写；崩溃爆炸半径只剩最后一行</text>
</svg>
